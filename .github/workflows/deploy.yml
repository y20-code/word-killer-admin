name: Deploy Word Killer Admin

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout Code
      uses: actions/checkout@v3

    - name: 🟢 搭建安检环境 (Setup Node.js)
      uses: actions/setup-node@v3
      with:
        node-version: '18'
      
    - name: 📥 下载工程依赖 (npm install)
      run: npm install

    - name: 🛡️ 语法级安检 (ESLint)
      run: npm run lint
    
    - name: 🧪 逻辑级安检 (Unit Test)
      run: npm run test

    - name: 🏗️ Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false 
        tags: word:latest

    # 第 1 步：正常打包构建你的 word 镜像
    - name: 🏗️ Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false # 我们不往被墙的 Docker Hub 推了！
        tags: word:latest

    # 第 2 步：【核心黑科技】把镜像压缩成一个实体的 .tar 文件包
    - name: 📦 Save Image to Tar
      run: docker save word:latest -o word.tar

    # 第 3 步：【核心黑科技】通过刚刚打通的 SSH 隧道，把文件直接扔进阿里云的 /root 目录
    - name: 🚚 SCP Tar to Aliyun
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USER }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        source: "word.tar"
        target: "/root/"

    # 第 4 步：远程登录阿里云，解压文件并运行！
    - name: 🚀 Deploy to Aliyun Server
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USER }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        script: |
          docker stop word-app || true
          docker rm word-app || true
          
          # 直接从刚才传过来的实体文件里加载镜像，彻底绕过网络防火墙！
          docker load -i /root/word.tar
          
          # 启动容器！
          docker run -d -p 80:80 --name word-app word:latest
          
          # 销毁压缩包，释放你的服务器内存
          rm -f /root/word.tar